services:
  backend:
    build: .
    container_name: cj-secure-backend
    ports:
      - "5000:5000"
    environment:
      - MFA_METHOD=${MFA_METHOD:-totp}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - FROM_EMAIL=${FROM_EMAIL}
      - PYTHONPATH=/app
    volumes:
      - .:/app
    command: python -m apps.main
